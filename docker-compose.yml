services:
  app:
    build: .
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MatchingSettings__LlmEndpoint=http://llama-server:11434
      - MatchingSettings__ModelName=llama3:8b
    volumes:
      - resume_app_data:/app/resumes
      - /home/Anuja/JobWebScraper/ResumeMatch/models:/app/models:Z

volumes:
  ollama_data:
    external: true
  resume_app_data:
    external: true

